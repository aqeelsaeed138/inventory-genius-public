apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-deployment

spec:
  replicas: 2

  selector:
    matchLabels:
      app: inventory-app

  template:
    metadata:
      labels:
        app: inventory-app

    spec:
      containers:
        - name: inventory-container
          image: aqeelsaeed/inventory-genius:v1
          ports:
            - containerPort: 80